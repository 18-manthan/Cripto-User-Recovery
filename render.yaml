services:
  - type: web
    name: rud-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        scope: run
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./rud_demo.db
        scope: run
      - key: PYTHON_VERSION
        value: 3.11.0
